<!DOCTYPE html>
<html>
<head>
  <title>Simple Mobile Website</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- jQuery Mobile CSS -->
  <link rel="stylesheet"
  href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

  <!-- jQuery Library -->
  <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>

  <!-- jQuery Mobile JS -->
  <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

  <style>
body{
    font-family: Arial;
}

/* Header */
.ui-header{
    background: #6a11cb !important;
    border-color: #6a11cb !important;
    color: white !important;
}

/* Footer */
.ui-footer{
    background: #2575fc !important;
    border-color: #2575fc !important;
    color: white !important;
}

/* Buttons */
.ui-btn{
    background: linear-gradient(45deg,#ff512f,#dd2476) !important;
    color: white !important;
    border: none !important;
    border-radius: 12px !important;
    font-size: 16px !important;
}

/* Content */
.ui-content{
    background: #f4f7ff;
    min-height: 100vh;
}

/* Headings */
h1,h2{
    color: #333;
}
</style>
</head>
<body>
<!-- Home Page -->
<div data-role="page" id="home">
<div data-role="header" data-theme="b">
<h1>My Mobile Site</h1>
</div>
<div data-role="content">
<h2>Welcome</h2>
<p>This is a simple mobile website using jQuery Mobile.</p>
<a href="#about" data-role="button" data-icon="info">About</a>
<a href="#contact" data-role="button" data-icon="phone">Contact</a>
</div>
<div data-role="footer" data-position="fixed">
<h4>© 2026 Mobile Website</h4>
</div>
</div>
<!-- About Page -->
<div data-role="page" id="about">
<div data-role="header" data-theme="b">
<h1>About</h1>
<a href="#home" data-icon="home">Home</a>
</div>
<div data-role="content">
<h2>About Us</h2>
<p>This mobile website is created using jQuery Mobile.</p>
<p>It is responsive and works on all devices.</p>
</div>
<div data-role="footer" data-position="fixed">
<h4>About Page</h4>
</div>
</div>
<!-- Contact Page -->
<div data-role="page" id="contact">
<div data-role="header" data-theme="b">
<h1>Contact</h1>
<a href="#home" data-icon="home">Home</a>
</div>
<div data-role="content">
<h2>Contact Us</h2>
<form>
<label for="name">Name:</label>
<input type="text" id="name" placeholder="Enter your name">
<label for="email">Email:</label>
<input type="email" id="email" placeholder="Enter your email">
<label for="message">Message:</label>
<textarea id="message"></textarea>
<input type="submit" value="Submit">
</form>
</div>
<div data-role="footer" data-position="fixed">
<h4>Contact Page</h4>
</div>
</div>
</body>
</html>
